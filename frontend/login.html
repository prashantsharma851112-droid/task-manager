<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager — Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">

    <!-- Brand panel (visible on wider screens) -->
    <div class="auth-brand">
      <div class="auth-brand-top">
        <div class="brand-mark">Task Manager — 001</div>
        <h2>Clear the noise.<br>Ship the work.</h2>
      </div>
      <div class="auth-brand-bottom">
        <span class="quote-mark">"</span>
        <p>A short, opinionated list beats a long, forgotten one. Sign in and see exactly what's next.</p>
      </div>
    </div>

    <!-- Form panel -->
    <div class="auth-panel">
      <div class="auth-container">
        <h1>📋 Task Manager</h1>

        <div class="auth-tabs">
          <button id="tab-login" class="auth-tab active">Login</button>
          <button id="tab-register" class="auth-tab">Register</button>
        </div>

        <div class="auth-subtabs">
          <button id="subtab-email" class="auth-subtab active">Email</button>
          <button id="subtab-phone" class="auth-subtab">Phone OTP</button>
        </div>

        <p id="auth-error" class="auth-error"></p>
        <p id="auth-info" class="auth-info"></p>

        <!-- LOGIN with Email -->
        <form id="login-email-form" class="auth-form">
          <input type="email" id="login-email" placeholder="Email" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>

        <!-- LOGIN with Phone: step 1 -->
        <form id="login-phone-form" class="auth-form hidden">
          <input type="tel" id="login-phone" placeholder="Phone number (e.g. 9876543210)" required>
          <button type="submit">Send OTP</button>
        </form>

        <!-- LOGIN with Phone: step 2 -->
        <form id="login-otp-form" class="auth-form hidden">
          <input type="text" id="login-otp-code" placeholder="Enter 6-digit OTP" required maxlength="6">
          <button type="submit">Verify & Login</button>
          <button type="button" id="login-change-number" class="link-btn">Use a different number</button>
        </form>

        <!-- REGISTER with Email -->
        <form id="register-email-form" class="auth-form hidden">
          <input type="text" id="register-name-email" placeholder="Full Name" required>
          <input type="email" id="register-email" placeholder="Email" required>
          <input type="password" id="register-password" placeholder="Password (min 6 characters)" required minlength="6">
          <button type="submit">Create Account</button>
        </form>

        <!-- REGISTER with Phone: step 1 -->
        <form id="register-phone-form" class="auth-form hidden">
          <input type="text" id="register-name-phone" placeholder="Full Name" required>
          <input type="tel" id="register-phone" placeholder="Phone number (e.g. 9876543210)" required>
          <button type="submit">Send OTP</button>
        </form>

        <!-- REGISTER with Phone: step 2 -->
        <form id="register-otp-form" class="auth-form hidden">
          <input type="text" id="register-otp-code" placeholder="Enter 6-digit OTP" required maxlength="6">
          <button type="submit">Verify & Create Account</button>
          <button type="button" id="register-change-number" class="link-btn">Use a different number</button>
        </form>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
